# --------------------------------

# --------------------------------
# --------- DATAOPS JOB ----------
# --------------------------------

apply-dataops:
  stage: infra
  tags: [shell]
  rules:
    - changes:
        - apps/dataops/**/*
        - infra/k8s/apps/dataops/**/*
  script:
    - kubectl apply -f infra/k8s/apps/dataops/

build-dataops:
  stage: build
  tags: [shell]
  needs:
    - job: apply-dataops
      optional: true
  rules:
    - changes:
        - apps/dataops/**/*
  script:
    - cd apps/dataops
    - docker build --target listener -t localhost:5001/dataops-listener:$IMAGE_TAG .
    - docker build --target persistence -t localhost:5001/dataops-persistence:$IMAGE_TAG .
    - docker push localhost:5001/dataops-listener:$IMAGE_TAG
    - docker push localhost:5001/dataops-persistence:$IMAGE_TAG

deploy-dataops:
  stage: deploy
  tags: [shell]
  needs:
    - job: build-dataops
  rules:
    - changes:
        - apps/dataops/**/*
  script:
    - kubectl set image deployment/listener listener=localhost:5000/dataops-listener:$IMAGE_TAG
    - kubectl set image deployment/persistence persistence=localhost:5000/dataops-persistence:$IMAGE_TAG
    - kubectl rollout status deployment/listener --timeout=120s
    - kubectl rollout status deployment/persistence --timeout=120s

# --------------------------------

# --------------------------------
# ---------- MLOPS JOB -----------
# --------------------------------

apply-mlops:
  stage: infra
  tags: [shell]
  rules:
    - changes:
        - apps/ml-ops/**/*
        - infra/k8s/apps/ml-ops/**/*
  script:
    - kubectl apply -f infra/k8s/apps/ml-ops/

build-mlops:
  stage: build
  tags: [shell]
  needs:
    - job: apply-mlops
      optional: true
  rules:
    - changes:
        - apps/ml-ops/**/*
  script:
    - cd apps/ml-ops
    - docker build --target train -t localhost:5001/ml-train:$IMAGE_TAG .
    - docker build --target predict -t localhost:5001/ml-predict:$IMAGE_TAG .
    - docker push localhost:5001/ml-train:$IMAGE_TAG
    - docker push localhost:5001/ml-predict:$IMAGE_TAG

    - cd mlflow
    - docker build -t localhost:5001/mlflow:$IMAGE_TAG .
    - docker push localhost:5001/mlflow:$IMAGE_TAG

deploy-mlops:
  stage: deploy
  tags: [shell]
  needs:
    - job: build-mlops
  rules:
    - changes:
        - apps/ml-ops/**/*
  script:
    - kubectl set image deployment/ml-train ml-train=localhost:5000/ml-train:$IMAGE_TAG
    - kubectl set image deployment/ml-predict ml-predict=localhost:5000/ml-predict:$IMAGE_TAG
    - kubectl set image deployment/mlflow mlflow=localhost:5000/mlflow:$IMAGE_TAG
    - kubectl rollout status deployment/ml-train --timeout=120s
    - kubectl rollout status deployment/ml-predict --timeout=120s
    - kubectl rollout status deployment/mlflow --timeout=120s

