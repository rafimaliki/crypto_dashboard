  stage: infra
  tags: [shell]
  rules:
    - changes:
        - infra/k8s/platform/postgres/**/*
  script:
    - kubectl apply -f infra/k8s/platform/postgres/

apply-superset:
  stage: infra
  tags: [shell]
  rules:
    - changes:
        - infra/k8s/apps/superset/**/*
  script:
    - kubectl apply -f infra/k8s/apps/superset/

build-superset:
  stage: build
  tags: [shell]
  needs:
    - job: apply-superset
      optional: true
  rules:
    - changes:
        - apps/superset/**/*
  script:
    - cd apps/superset
    - docker build -t localhost:5001/superset-pgdriver:$IMAGE_TAG .
    - docker push localhost:5001/superset-pgdriver:$IMAGE_TAG

deploy-superset:
  stage: deploy
  tags: [shell]
  needs:
    - job: build-superset
  rules:
    - changes:
        - apps/superset/**/*
  script:
    - kubectl set image deployment/superset superset=localhost:5000/superset-pgdriver:$IMAGE_TAG
    - kubectl rollout status deployment/superset --timeout=120s

apply-n8n:
