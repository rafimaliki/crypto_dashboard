# .gitlab-ci.yml

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "deployment"'
    - when: never

stages:
  - health-check
  - infra
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# --------------------------------
# ------- HEALTH CHECK JOB -------
# --------------------------------

health-check:
  stage: health-check
  tags: [shell]
  script:
    - echo "Gitlab CI is running on branch $CI_COMMIT_BRANCH"
    - whoami
    - date
    - kubectl version --client

