# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: default
  labels:
    app: mlflow
spec:
  selector:
    matchLabels:
      app: mlflow
  replicas: 1
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: localhost:5000/mlflow:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: MLFLOW_BACKEND_STORE_URI
              value: postgresql://postgres:postgres@postgres:5432/postgres
            - name: MLFLOW_ARTIFACT_ROOT
              value: /mlflow/artifacts
            - name: MLFLOW_HOST
              value: 0.0.0.0
            - name: MLFLOW_PORT
              value: "5001"
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /mlflow/artifacts
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: mlflow-artifacts
          emptyDir: {}
---
# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-predict
  namespace: default
  labels:
    app: ml-predict
spec:
  selector:
    matchLabels:
      app: ml-predict
  replicas: 1
  template:
    metadata:
      labels:
        app: ml-predict
    spec:
      containers:
        - name: ml-predict
          image: localhost:5000/ml-predict:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5001
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
---
