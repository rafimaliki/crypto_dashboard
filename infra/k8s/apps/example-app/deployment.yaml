apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      containers:
        - name: example-app
          image: localhost:5000/example-app:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: example-app
spec:
  type: NodePort
  selector:
    app: example-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
